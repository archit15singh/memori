name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  crates-io:
    name: Publish memori-ai-core to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo publish --dry-run
        run: cargo publish -p memori-ai-core --dry-run

      - name: cargo publish
        run: cargo publish -p memori-ai-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  pypi:
    name: Build wheels for ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: memori-python
          command: publish
          args: --non-interactive --skip-existing
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [crates-io, pypi]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release even if registry jobs had failures
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          body_path: CHANGELOG.md